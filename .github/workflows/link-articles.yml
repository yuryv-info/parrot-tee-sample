name: Link articles

# Backfill the published Substack + LinkedIn article links into the README and
# commit the change straight to main. Run this once the posts are live:
#   Actions -> "Link articles" -> Run workflow -> paste the two URLs.
# Re-running with new URLs just updates them (the README markers are preserved,
# so it is idempotent).

on:
  workflow_dispatch:
    inputs:
      substack_url:
        description: "Full Substack article URL"
        required: false
        default: ""
        type: string
      linkedin_url:
        description: "Full LinkedIn newsletter URL"
        required: false
        default: ""
        type: string

permissions:
  contents: write

jobs:
  link:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Rewrite README links
        env:
          SUBSTACK_URL: ${{ inputs.substack_url }}
          LINKEDIN_URL: ${{ inputs.linkedin_url }}
        run: |
          set -euo pipefail
          if [ -n "$SUBSTACK_URL" ]; then
            perl -0pi -e 's|<!--SUBSTACK_URL-->.*?<!--/SUBSTACK_URL-->|<!--SUBSTACK_URL-->[Read on Substack]('"$SUBSTACK_URL"')<!--/SUBSTACK_URL-->|s' README.md
          fi
          if [ -n "$LINKEDIN_URL" ]; then
            perl -0pi -e 's|<!--LINKEDIN_URL-->.*?<!--/LINKEDIN_URL-->|<!--LINKEDIN_URL-->[Read on LinkedIn]('"$LINKEDIN_URL"')<!--/LINKEDIN_URL-->|s' README.md
          fi

      - name: Commit to main
        run: |
          set -euo pipefail
          if git diff --quiet -- README.md; then
            echo "No README change (did you pass at least one URL?). Nothing to do."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs: link published Substack and LinkedIn articles"
          git push origin HEAD:main
